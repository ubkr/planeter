<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Se vilka planeter som är synliga just nu från din plats i Sverige.">
  <meta name="theme-color" content="#0f1117">
  <title>Planeter – Planetsynlighet i Sverige</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin="" defer></script>
</head>
<body>
  <div class="app-container">

    <header class="app-header">
      <div class="header-top">
        <h1 class="app-title">🪐 Planeter</h1>
        <button class="settings-trigger settings-btn" id="settingsTrigger" aria-label="Öppna inställningar" title="Inställningar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
      <div class="header-info">
        <p id="locationDisplay" class="location-display">Hämtar plats...</p>
        <p id="lastUpdate" class="last-update"></p>
      </div>
    </header>

    <div class="tab-nav" role="tablist" aria-label="Huvudnavigering" id="tabNav">
      <button class="tab-nav__tab tab-nav__tab--active"
              role="tab"
              id="tabPlaneter"
              data-tab="planeter"
              aria-selected="true"
              aria-controls="panelPlaneter"
              tabindex="0">
        Planeter
      </button>
      <button class="tab-nav__tab"
              role="tab"
              id="tabSkyMap"
              data-tab="skymap"
              aria-selected="false"
              aria-controls="panelSkyMap"
              tabindex="-1">
        Stj&auml;rnkarta
      </button>
      <button class="tab-nav__tab"
              role="tab"
              id="tabEvents"
              data-tab="events"
              aria-selected="false"
              aria-controls="panelEvents"
              tabindex="-1">
        Kommande
      </button>
      <button class="tab-nav__tab"
              role="tab"
              id="tabSolarSystem"
              data-tab="solarsystem"
              aria-selected="false"
              aria-controls="panelSolarSystem"
              tabindex="-1">
        Solsystemet
      </button>
      <button class="tab-nav__tab"
              role="tab"
              id="tabAltitudeTimeline"
              data-tab="altitudetimeline"
              aria-selected="false"
              aria-controls="panelAltitudeTimeline"
              tabindex="-1">
        Höjdkurva
      </button>
    </div>

    <main class="main-content">
      <!-- Error banner (hidden by default, global – visible in all tabs) -->
      <div id="errorBanner" class="error-banner hidden" role="alert">
        <span id="errorMessage">Ett fel uppstod.</span>
        <button class="error-banner-dismiss" id="errorDismiss" aria-label="Stäng">&#10005;</button>
      </div>

      <!-- Planeter tab panel -->
      <div id="panelPlaneter" role="tabpanel" aria-labelledby="tabPlaneter">
        <!-- Sky summary banner -->
        <section id="skySummary"></section>

        <!-- Event alert banners (hidden when no events) -->
        <div id="eventAlerts"></div>

        <!-- Planet cards grid -->
        <div id="planetCards"></div>
      </div>

      <!-- Stjärnkarta tab panel (hidden by default) -->
      <div id="panelSkyMap" role="tabpanel" aria-labelledby="tabSkyMap" class="tab-panel--hidden" hidden>
        <div class="sky-map-panel">
          <!-- Expand / minimise button -->
          <button class="sky-map-expand-btn" aria-label="Förstora stjärnkartan" title="Förstora">
            <span aria-hidden="true">&#x26F6;</span>
            <span class="sky-map-expand-btn__label">Förstora</span>
          </button>
          <!-- 2D / 3D view toggle -->
          <div class="skymap-view-toggle" role="group" aria-label="Kartvy">
            <button class="skymap-view-toggle__btn active" data-view="2d" aria-pressed="true">2D</button>
            <button class="skymap-view-toggle__btn" data-view="3d" aria-pressed="false">3D Vy</button>
          </div>
          <!-- Constellation controls -->
          <div class="sky-map-constellation-controls">
            <label>
              <input type="checkbox" id="constellationToggle" checked>
              Stjärnbilder
            </label>
            <label>
              <input type="range" id="constellationIntensity" min="0" max="1" step="0.05" value="0.25">
              Intensitet
            </label>
          </div>
          <!-- Zoom controls -->
          <div class="sky-map-zoom-controls">
            <button class="sky-map-zoom-btn" data-zoom="in" aria-label="Zooma in" title="Zooma in">+</button>
            <button class="sky-map-zoom-btn" data-zoom="out" aria-label="Zooma ut" title="Zooma ut">&minus;</button>
          </div>
          <!-- 2D SVG sky map -->
          <div id="skyMapContainer" class="sky-map-container">
            <p class="sky-map-placeholder">Stj&auml;rnkartan kommer snart...</p>
          </div>
          <!-- 3D WebGL sky dome (hidden until the 3D toggle is activated) -->
          <div id="skyMap3dContainer" aria-hidden="true" aria-label="3D-himmel">
            <div class="skymap-3d-error" hidden></div>
          </div>
        </div>
      </div>

      <!-- Kommande händelser tab panel (hidden by default) -->
      <div id="panelEvents" role="tabpanel" aria-labelledby="tabEvents" class="tab-panel--hidden" hidden>
        <div id="eventsTimelineContainer"></div>
      </div>

      <!-- Solsystemet tab panel (hidden by default) -->
      <div id="panelSolarSystem" role="tabpanel" aria-labelledby="tabSolarSystem" class="tab-panel--hidden" hidden>
        <div class="solar-system-panel">
          <button class="solar-system-expand-btn" aria-label="Förstora solsystemsvyn" title="Förstora">
            <span aria-hidden="true">&#x26F6;</span>
            <span class="solar-system-expand-btn__label">Förstora</span>
          </button>
          <div id="solarSystemContainer"></div>
        </div>
      </div>

      <!-- Höjdkurva tab panel (hidden by default) -->
      <div id="panelAltitudeTimeline"
           role="tabpanel"
           aria-labelledby="tabAltitudeTimeline"
           class="tab-panel--hidden"
           hidden>
        <div id="altitudeTimelineContainer"></div>
      </div>
    </main>

    <footer class="app-footer">
      <p>Planeter – Astronomiska beräkningar med <a href="https://rhodesmill.org/pyephem/" target="_blank" rel="noopener">ephem</a> · Väderdata från <a href="https://api.met.no/" target="_blank" rel="noopener">Met.no</a></p>
    </footer>

    <!-- Settings modal container -->
    <div id="settingsModalContainer"></div>
  </div>

  <!-- Import map feature detection: set window._noImportMap=true for browsers
       that do not support import maps so the 3D toggle can disable itself. -->
  <script>
    if (!HTMLScriptElement.supports || !HTMLScriptElement.supports('importmap')) {
      window._noImportMap = true;
    }
  </script>
  <!-- Import map: lets ES modules use bare specifiers for Three.js. -->
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three.module.min.js",
      "three/addons/": "./lib/three/addons/"
    }
  }
  </script>
  <!-- Tooltip (non-module, self-initializing) - load if it exists -->
  <script src="js/components/tooltip.js" onerror="this.remove()"></script>
  <!-- Main app module -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
